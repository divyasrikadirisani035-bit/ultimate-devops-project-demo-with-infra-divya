name: email-ci

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "src/email/**"
      - "kubernetes/email/**"
      - ".github/workflows/email-ci.yaml"
      - ".github/workflows/reusable-docker-k8s.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: src/email

      - name: Ruby syntax check
        run: |
          cd src/email
          ruby -c email_server.rb

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true
          working-directory: src/email

      - name: Bundle check
        run: |
          cd src/email
          bundle check

  docker-k8s:
    needs: [build, code-quality]
    uses: ./.github/workflows/reusable-docker-k8s.yaml
    with:
      service_name: email
      docker_context: .
      dockerfile_path: src/email/Dockerfile
      k8s_manifest_path: kubernetes/email/deploy.yaml
      git_user_email: divyasrikadirisani035@gmail.com
      git_user_name: divyasrikadirisani035-bit
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      TOKEN: ${{ secrets.TOKEN }}