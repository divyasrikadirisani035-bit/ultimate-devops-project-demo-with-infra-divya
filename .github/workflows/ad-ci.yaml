# CI/CD for Ad Service

name: ad-ci

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Ad service
        run: |
          cd src/ad
          chmod +x gradlew
          ./gradlew build

      - name: Run tests
        run: |
          cd src/ad
          chmod +x gradlew
          ./gradlew test

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle check
        run: |
          cd src/ad
          chmod +x gradlew
          ./gradlew check

  docker:
    runs-on: ubuntu-latest

    needs: [build, code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: src/ad
          file: src/ad/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ad:${{ github.run_id }}

  updatek8s:
    runs-on: ubuntu-latest

    needs: docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update Ad image in Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/ad:${{ github.run_id }}|" kubernetes/ad/deploy.yaml

      - name: Commit and push Kubernetes manifest update
        run: |
          git config --global user.email "divyasrikadirisani035@gmail.com"
          git config --global user.name "divyasrikadirisani035-bit"
          git add kubernetes/ad/deploy.yaml
          git commit -m "[CI]: Update ad image tag" || echo "No changes to commit"
          git push origin HEAD:main