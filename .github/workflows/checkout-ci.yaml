name: checkout-ci

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/checkout/**"
      - "kubernetes/checkout/**"
      - ".github/workflows/checkout-ci.yaml"
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v2
        with:
          go-version: 1.22

      - name: Build checkout service
        run: |
          cd src/checkout
          go mod download
          go build -o checkout-service main.go

      - name: Run tests
        run: |
          cd src/checkout
          go test ./...

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go 1.22
        uses: actions/setup-go@v2
        with:
          go-version: 1.22

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.55.2
          working-directory: src/checkout
          args: --timeout=5m

  docker:
    runs-on: ubuntu-latest

    needs: [build, code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push checkout Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/checkout/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/checkout:${{ github.run_id }}

  updatek8s:
    runs-on: ubuntu-latest

    needs: docker

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          ref: main

      - name: Sync latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Update checkout image in Kubernetes manifest
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/checkout:${{ github.run_id }}|" kubernetes/checkout/deploy.yaml

      - name: Commit and push Kubernetes manifest update
        run: |
          git config --global user.email "divyasrikadirisani035@gmail.com"
          git config --global user.name "divyasrikadirisani035-bit"
          git add kubernetes/checkout/deploy.yaml
          git commit -m "[CI]: Update checkout image tag" || echo "No changes to commit"
          git push origin main