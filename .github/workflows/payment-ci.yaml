name: payment-ci

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "src/payment/**"
      - "kubernetes/payment/**"
      - ".github/workflows/payment-ci.yaml"
      - ".github/workflows/reusable-docker-k8s.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd src/payment
          npm ci

      - name: Syntax check
        run: |
          cd src/payment
          node --check index.js
          node --check charge.js
          node --check logger.js
          node --check opentelemetry.js

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Dependency audit
        run: |
          cd src/payment
          npm ci
          npm audit --audit-level=high || true

  sonarqube:
    runs-on: ubuntu-latest

    needs: [build, code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: src/payment
          #args: >
          # -Dsonar.qualitygate.wait=true

  docker-k8s:
    needs: sonarqube
    uses: ./.github/workflows/reusable-docker-k8s.yaml
    with:
      service_name: payment
      docker_context: .
      dockerfile_path: src/payment/Dockerfile
      k8s_manifest_path: kubernetes/payment/deploy.yaml
      git_user_email: divyasrikadirisani035@gmail.com
      git_user_name: divyasrikadirisani035-bit
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      TOKEN: ${{ secrets.TOKEN }}