name: cart-ci

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "src/cart/**"
      - "kubernetes/cart/**"
      - ".github/workflows/cart-ci.yaml"
      - ".github/workflows/reusable-docker-k8s.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: |
          cd src/cart
          dotnet restore cart.sln

      - name: Build cart service
        run: |
          cd src/cart
          dotnet build cart.sln --configuration Release --no-restore

      - name: Run tests
        run: |
          cd src/cart
          dotnet test cart.sln --configuration Release --no-build

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build validation
        run: |
          cd src/cart
          dotnet build cart.sln --configuration Release

  docker-k8s:
    needs: [build, code-quality]
    uses: ./.github/workflows/reusable-docker-k8s.yaml
    with:
      service_name: cart
      docker_context: .
      dockerfile_path: src/cart/src/Dockerfile
      k8s_manifest_path: kubernetes/cart/deploy.yaml
      git_user_email: divyasrikadirisani035@gmail.com
      git_user_name: divyasrikadirisani035-bit
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
      TOKEN: ${{ secrets.TOKEN }}